# deploy/fly.meg.toml — Fly.io config for Meg's Adi.
#
# Canonical deploy (locally-built image, see deploy/DEPLOY.md §3–5):
#   docker build -t openclaw:local .
#   docker build -f deploy/Dockerfile.adi \
#     --build-arg ADI_USER=meg \
#     --build-arg UPSTREAM_IMAGE=openclaw:local \
#     -t adi-meg:local .
#   fly deploy -c deploy/fly.meg.toml --image adi-meg:local --local-only
#
# The [build] block below is documentation-only on the --image path.
#
# If `adi-meg` is taken globally on Fly, change `app =` and `source =`
# (volume name) together, keeping them consistent.

app = "adi-meg"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile.adi"
  [build.args]
    ADI_USER = "meg"
    OPENCLAW_EXTENSIONS = "slack telegram"

[env]
  NODE_ENV = "production"
  OPENCLAW_PREFER_PNPM = "1"
  OPENCLAW_STATE_DIR = "/data"
  NODE_OPTIONS = "--max-old-space-size=1536"
  OPENCLAW_AGENT_ID = "meg"

[processes]
  app = "/app/entrypoint.sh"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-2x"
  memory = "4096mb"
  # Bumped from 2048mb during Phase 1a deploy. 2GB left openclaw gateway +
  # cliproxy sidecar + Node.js heap with no headroom on cold-start — gateway
  # would take 4+ minutes to emit its first log on slow restarts. 4GB gives
  # enough slack for consistent sub-minute boots.

[mounts]
  source = "adi_meg_data"
  destination = "/data"
  initial_size = "10gb"
